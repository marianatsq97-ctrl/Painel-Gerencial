<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Areia Ana</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #050814;
      --accent: #ff7a1a;
      --text: #f5f7fb;
      --muted: #99a5c3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(255, 122, 26, 0.15), transparent 30%),
        var(--bg);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .logo {
      width: 140px;
      opacity: 0.9;
    }

    .card {
      width: 320px;
      padding: 24px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field span {
      font-size: 0.85rem;
      color: var(--muted);
    }

    input {
      height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      height: 42px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff7a1a, #ff9145);
      color: #1b120b;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .msg {
      font-size: 0.85rem;
      color: #ff6b6b;
      min-height: 16px;
    }
  </style>
</head>

<body data-page="login">

  <div class="container">

    <img src="logo-areia-ana.svg" class="logo" />

    <form id="loginForm" class="card">

      <label class="field">
        <span>Usuário</span>
        <input id="username" type="text" required />
      </label>

      <label class="field">
        <span>Senha</span>
        <input id="password" type="password" required />
      </label>

      <button type="submit">Acessar</button>

      <div id="loginMessage" class="msg"></div>

    </form>

  </div>

  <script>
    const CREDENTIALS = {
      admin: { password: 'admin123', redirect: 'admin.html' },
      usuario: { password: '123', redirect: 'dashboard.html' }
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const user = document.getElementById('username').value.toLowerCase();
      const pass = document.getElementById('password').value;

      const cred = CREDENTIALS[user];

      if (!cred || cred.password !== pass) {
        document.getElementById('loginMessage').textContent = 'Usuário ou senha inválidos';
        return;
      }

      localStorage.setItem('session', JSON.stringify({ user }));

      window.location.href = cred.redirect;
    });
  </script>

</body>
</html>
